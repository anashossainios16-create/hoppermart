<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hopper Mart</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8f8f8;
color:#222;
}

header{
background:#ffffff;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 8px rgba(0,0,0,.1);
position:sticky;
top:0;
}

.logo{
font-size:28px;
font-weight:bold;
}

.logo span{
color:#ff7a00;
}

.search{
width:45%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.cart{
background:#ff7a00;
color:white;
padding:10px 18px;
border-radius:8px;
font-weight:bold;
}

.hero{
background:linear-gradient(rgba(0,0,0,.45),rgba(0,0,0,.45)),
url('https://images.unsplash.com/photo-1556911220-bff31c812dba?w=1200');
background-size:cover;
background-position:center;
height:320px;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
color:white;
padding:20px;
}

.hero h1{
font-size:38px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
}

.btn{
display:inline-block;
margin-top:20px;
background:#ff7a00;
padding:14px 28px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:bold;
}

.section{
padding:25px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:15px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.card h3{
margin-bottom:8px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:20px;
margin-top:30px;
}

</style>

</head>

<body>

<header>

<div class="logo">
HOPPER <span>MART</span>
</div>

<input class="search" placeholder="Search Products">

<div class="cart">
🛒 Cart
</div>

</header>

<section class="hero">

<div>

<h1>Welcome to Hopper Mart</h1>

<p>Kitchen Essentials at the Best Price</p>

<a class="btn">Shop Now</a>

</div>

</section>

<section class="section">

<h2>Categories</h2>

<br>

<div class="cards">

<div class="card">
<h3>🍳 Cooker</h3>
</div>

<div class="card">
<h3>🥤 Sipper</h3>
</div>

<div class="card">
<h3>⚡ Blender</h3>
</div>

<div class="card">
<h3>🔪 Grinder</h3>
</div>

<div class="card">
<h3>🏠 Kitchen Decor</h3>
</div>

<div class="card">
<h3>🍽 Glass</h3>
</div>

</div>

</section>

<footer>

© 2026 Hopper Mart

</footer>

</body>
</html>
